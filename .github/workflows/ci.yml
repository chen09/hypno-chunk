name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        working-directory: ./web
        run: npm ci
      
      - name: Run linter
        working-directory: ./web
        run: npm run lint
      
      - name: Run TypeScript type check
        working-directory: ./web
        run: npx tsc --noEmit
      
      - name: Build project
        working-directory: ./web
        run: npm run build

