services:
  web:
    image: chen920/hypnochunk-web:latest
    container_name: hypnochunk-web
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /var/www/hypnochunk/data/2_audio_output:/app/audio:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    environment:
      - AUDIO_DIR=/app/audio
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: "1g"
    cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/files"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

