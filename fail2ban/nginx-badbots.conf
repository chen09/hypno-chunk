# Fail2Ban filter for nginx badbots
# 用于检测和阻止恶意爬虫

[Definition]

# 匹配模式：检测恶意爬虫的 User-Agent
# 使用字符类 [Bb] 来实现大小写不敏感匹配（fail2ban 不支持 (?i) 在中间）
failregex = ^<HOST> -.*"GET.*".*"[^"]*[Bb][Oo][Tt].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Cc][Rr][Aa][Ww][Ll][Ee][Rr].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Ss][Pp][Ii][Dd][Ee][Rr].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Ss][Cc][Rr][Aa][Pp][Ee][Rr].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Ss][Cc][Aa][Nn][Nn][Ee][Rr].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Hh][Aa][Cc][Kk].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Ee][Xx][Pp][Ll][Oo][Ii][Tt].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Ss][Qq][Ll][Mm][Aa][Pp].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Nn][Ii][Kk][Tt][Oo].*" .*$
            ^<HOST> -.*"GET.*".*"[^"]*[Nn][Mm][Aa][Pp].*" .*$

ignoreregex = (?i)(googlebot|bingbot|slurp|duckduckbot|baiduspider|yandex|sogou|exabot|facebot|ia_archiver)

# 日期格式
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:\.%%f)?(?:\s*%%z)?
