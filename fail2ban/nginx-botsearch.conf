# Fail2Ban filter for nginx bot search
# 用于检测恶意爬虫和扫描行为

[Definition]

# 匹配模式：检测常见的恶意请求
# 1. 404/403/400 错误（可能是扫描）
# 2. 尝试访问敏感路径（php, admin, wp-login 等）
# 3. SQL 注入尝试
# 4. 脚本注入尝试

failregex = ^<HOST> -.*"(GET|POST|HEAD) /.*" (404|403|400) .*$
            ^<HOST> -.*"(GET|POST) /(php|admin|wp-login|xmlrpc|\.env|config|\.git|\.svn).*" .*$
            ^<HOST> -.*"(GET|POST) /.*(sql|union|select|script|eval|base64|exec).*" .*$
            ^<HOST> -.*"(GET|POST) /.*\.(php|asp|exe|pl|cgi|sh|py|jsp|jar|war).*" .*$

ignoreregex =

# 日期格式（Nginx 默认格式）
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:\.%%f)?(?:\s*%%z)?
