# Fail2Ban filter for nginx noscript
# 用于检测脚本注入攻击

[Definition]

# 匹配模式：检测尝试执行脚本的请求
failregex = ^<HOST> -.*"(GET|POST) /.*\.(php|asp|exe|pl|cgi|sh|py|jsp|jar|war|dll|bat|cmd).*" .*$
            ^<HOST> -.*"(GET|POST) /.*\?(.*&)?.*(cmd|exec|eval|system|passthru|shell_exec).*=.*" .*$

ignoreregex =

# 日期格式
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:\.%%f)?(?:\s*%%z)?
